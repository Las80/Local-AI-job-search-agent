<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Company Blacklist — Job Search Agent</title>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; max-width: 800px; margin: 0 auto; padding: 2rem; background: #fff; color: #222; }
    h1 { font-size: 1.5rem; margin-bottom: 1rem; }
    table { width: 100%; border-collapse: collapse; margin: 1rem 0; }
    th, td { text-align: left; padding: 0.5rem; border-bottom: 1px solid #ddd; }
    th { font-weight: 600; }
    form { display: inline; }
    button, .btn { padding: 0.4rem 0.8rem; font-size: 0.9rem; cursor: pointer; background: #333; color: #fff; border: none; border-radius: 4px; text-decoration: none; }
    button:hover, .btn:hover { background: #555; }
    .btn { display: inline-block; margin-bottom: 1rem; }
    input[type="text"] { padding: 0.4rem; font-size: 1rem; width: 280px; margin-right: 0.5rem; }
    .nav { margin-bottom: 1.5rem; }
    .nav a { color: #0066cc; text-decoration: none; }
    .nav a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <nav class="nav"><a href="{{ url_for('jobs_page') }}">View jobs</a></nav>
  <h1>Company Blacklist</h1>
  <p>Companies listed here are excluded from job results.</p>

  <form action="{{ url_for('blacklist_add') }}" method="post">
    <input type="text" name="company" placeholder="Company name" required>
    <button type="submit">Add</button>
  </form>

  <table>
    <thead>
      <tr><th>Company</th><th>Action</th></tr>
    </thead>
    <tbody>
      {% for company in companies %}
      <tr>
        <td>{{ company }}</td>
        <td>
          <form action="{{ url_for('blacklist_remove') }}" method="post">
            <input type="hidden" name="company" value="{{ company }}">
            <button type="submit">Remove</button>
          </form>
        </td>
      </tr>
      {% else %}
      <tr><td colspan="2">No companies blacklisted.</td></tr>
      {% endfor %}
    </tbody>
  </table>
</body>
</html>
